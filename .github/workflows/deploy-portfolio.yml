name: Deploy KokoMusic to Portfolio

on:
  push:
    branches:
      - master
    paths:
      - "frontend/**"
      - "build-for-portfolio.js"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Push to KokoPortfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout KokoMusic
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend for portfolio
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TICKETMASTER_KEY: ${{ secrets.VITE_TICKETMASTER_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Checkout KokoPortfolio
        uses: actions/checkout@v4
        with:
          repository: LuisHerra/KokoPortfolio
          token: ${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}
          path: KokoPortfolio

      - name: Copy assets to portfolio
        run: node build-for-portfolio.js --portfolio-path ./KokoPortfolio --skip-build

      - name: Commit and push to KokoPortfolio
        working-directory: KokoPortfolio
        run: |
          git config user.name "KokoMusic CI"
          git config user.email "ci@kokomusic.app"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update KokoMusic build $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
